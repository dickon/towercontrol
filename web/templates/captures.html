<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TowerControl – Captures</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    #captureList { max-height: calc(100vh - 160px); overflow-y: auto; }
    .capture-item { cursor: pointer; border-left: 3px solid transparent; }
    .capture-item:hover, .capture-item.active { border-left-color: #0dcaf0; background: #111; }
    .capture-item .badge-live { font-size: 0.65rem; }
    #viewerImg { max-width: 100%; cursor: crosshair; border: 1px solid #333; display: block; }
    #coordOverlay {
      position: absolute; top: 6px; left: 6px;
      background: rgba(0,0,0,.75); color: #0ff;
      font-size: 0.75rem; padding: 3px 7px; border-radius: 4px;
      pointer-events: none; display: none;
    }
    #txtContent { font-size: 0.72rem; white-space: pre; overflow-x: auto;
                  max-height: calc(100vh - 200px); overflow-y: auto; }
    .tab-bar { gap: 6px; }
  </style>
</head>
<body class="bg-dark text-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-black px-3 d-flex justify-content-between">
    <div class="d-flex align-items-center gap-3">
      <a class="navbar-brand mb-0 h1" href="/">&#x1f3ef; TowerControl</a>
      <a class="btn btn-outline-secondary btn-sm" href="/">&#8592; Live</a>
      <span class="text-info fw-semibold">Captures</span>
    </div>
    <span id="captureCount" class="text-muted small"></span>
  </nav>

  <div class="container-fluid mt-3" style="height:calc(100vh - 70px)">
    <div class="row g-3 h-100">

      <!-- Left: file list -->
      <div class="col-lg-3 col-md-4">
        <div class="card bg-black border-secondary h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span>Capture Files</span>
            <button class="btn btn-outline-secondary btn-sm" onclick="loadCaptures()">&#8635;</button>
          </div>
          <div id="captureList" class="list-group list-group-flush"></div>
        </div>
      </div>

      <!-- Right: viewer -->
      <div class="col-lg-9 col-md-8">
        <div class="card bg-black border-secondary h-100">
          <div class="card-header d-flex align-items-center gap-2 tab-bar" id="viewTabs">
            <button id="tabAnnotated" class="btn btn-sm btn-outline-info active-tab"
                    onclick="showTab('annotated')">Annotated</button>
            <button id="tabPlain"     class="btn btn-sm btn-outline-secondary"
                    onclick="showTab('plain')">Plain</button>
            <button id="tabTxt"       class="btn btn-sm btn-outline-secondary"
                    onclick="showTab('txt')">Text</button>
            <span id="viewerTitle" class="ms-auto text-muted small text-truncate" style="max-width:400px"></span>
          </div>
          <div class="card-body p-2 position-relative" style="overflow:auto">
            <!-- Image viewer tabs -->
            <div id="paneAnnotated">
              <div class="position-relative d-inline-block">
                <img id="annotatedImg" src="" alt="" class="viewer-img" style="max-width:100%;cursor:crosshair;display:none;border:1px solid #333" />
                <div id="coordAnnotated" class="coord-overlay"></div>
              </div>
            </div>
            <div id="panePlain" style="display:none">
              <div class="position-relative d-inline-block">
                <img id="plainImg" src="" alt="" class="viewer-img" style="max-width:100%;cursor:crosshair;display:none;border:1px solid #333" />
                <div id="coordPlain" class="coord-overlay"></div>
              </div>
            </div>
            <div id="paneTxt" style="display:none">
              <pre id="txtContent" class="text-success mb-0"></pre>
            </div>
            <div id="paneEmpty" class="text-muted text-center mt-5">
              Select a capture from the list
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <style>
    .active-tab { background-color: #0dcaf0 !important; color: #000 !important; border-color: #0dcaf0 !important; }
    .coord-overlay {
      position: absolute; top: 6px; left: 6px;
      background: rgba(0,0,0,.75); color: #0ff;
      font-size: 0.75rem; padding: 3px 7px; border-radius: 4px;
      pointer-events: none; display: none;
    }
  </style>

  <script>
  let _current = null;   // current capture set object
  let _tab = "annotated";

  // ── Load file list ────────────────────────────────────────────────────

  async function loadCaptures() {
    const r   = await fetch("/api/captures");
    const list = await r.json();
    document.getElementById("captureCount").textContent = `${list.length} captures`;
    const el = document.getElementById("captureList");
    el.innerHTML = "";
    for (const cap of list) {
      const item = document.createElement("button");
      item.className = "list-group-item list-group-item-action list-group-item-dark capture-item py-1 px-2";
      const label = cap.label || cap.stem;
      const isLive = !!cap.label;
      item.innerHTML =
        `<div class="d-flex align-items-center gap-1">` +
        (isLive ? `<span class="badge bg-success badge-live">LIVE</span>` : "") +
        `<span class="small text-truncate" title="${esc(label)}">${esc(label)}</span></div>`;
      item.addEventListener("click", () => selectCapture(cap, item));
      el.appendChild(item);
    }
  }

  // ── Select a capture ──────────────────────────────────────────────────

  function selectCapture(cap, itemEl) {
    _current = cap;
    // Highlight selected
    document.querySelectorAll(".capture-item").forEach(e => e.classList.remove("active"));
    itemEl.classList.add("active");
    document.getElementById("paneEmpty").style.display = "none";
    document.getElementById("viewerTitle").textContent = cap.stem;
    loadCurrentTab();
  }

  function showTab(tab) {
    _tab = tab;
    ["annotated","plain","txt"].forEach(t => {
      document.getElementById("pane" + cap(t)).style.display = t === tab ? "" : "none";
      document.getElementById("tab"  + cap(t)).classList.toggle("active-tab", t === tab);
      document.getElementById("tab"  + cap(t)).classList.toggle("btn-outline-secondary", t !== tab);
      document.getElementById("tab"  + cap(t)).classList.toggle("btn-outline-info",      t === tab);
    });
    loadCurrentTab();
  }

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function loadCurrentTab() {
    if (!_current) return;
    if (_tab === "annotated") {
      const src = _current.annotated ? `/debug/${_current.annotated}` :
                  (_current.stem === "capture" ? "/debug/capture_annotated.png" : null);
      setImg("annotatedImg", "coordAnnotated", src);
    } else if (_tab === "plain") {
      setImg("plainImg", "coordPlain", `/debug/${_current.name}`);
    } else {
      loadTxt(_current.txt);
    }
  }

  function setImg(imgId, coordId, src) {
    const img = document.getElementById(imgId);
    const coord = document.getElementById(coordId);
    if (!src) {
      img.style.display = "none";
      coord.style.display = "none";
      return;
    }
    img.src = src;
    img.style.display = "block";
    // Coordinate inspector
    img.onmousemove = (e) => {
      const r  = img.getBoundingClientRect();
      const fx = ((e.clientX - r.left) / r.width).toFixed(4);
      const fy = ((e.clientY - r.top)  / r.height).toFixed(4);
      coord.style.display = "block";
      coord.textContent   = `fx=${fx}  fy=${fy}`;
    };
    img.onmouseleave = () => { coord.style.display = "none"; };
    img.onclick = (e) => {
      const r  = img.getBoundingClientRect();
      const fx = ((e.clientX - r.left) / r.width).toFixed(4);
      const fy = ((e.clientY - r.top)  / r.height).toFixed(4);
      navigator.clipboard?.writeText(`r.is_near(${fx}, ${fy})`);
      flashCoord(coord, `Copied! fx=${fx}  fy=${fy}`);
    };
  }

  async function loadTxt(name) {
    const pre = document.getElementById("txtContent");
    if (!name) { pre.textContent = "(no .txt file)"; return; }
    try {
      const r = await fetch(`/debug/${name}`);
      pre.textContent = await r.text();
    } catch (e) {
      pre.textContent = "Error loading: " + e;
    }
  }

  function flashCoord(el, msg) {
    const prev = el.textContent;
    el.textContent = msg;
    el.style.color = "#ff0";
    setTimeout(() => { el.style.color = ""; el.textContent = prev; }, 1500);
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  loadCaptures();
  </script>
</body>
</html>
